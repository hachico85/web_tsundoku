<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect x='8' y='14' width='28' height='38' rx='3' fill='%234f2f1b' transform='rotate(-8 22 33)'/><rect x='10' y='16' width='24' height='34' rx='2' fill='%231f8d61' transform='rotate(-8 22 33)'/><rect x='18' y='12' width='28' height='38' rx='3' fill='%234f2f1b' transform='rotate(4 32 31)'/><rect x='20' y='14' width='24' height='34' rx='2' fill='%23f5d03e' transform='rotate(4 32 31)'/></svg>">
  <title>積読ルーレット</title>
  <style>
    :root {
      --paper: #fbfbf6;
      --paper-deep: #f1eadb;
      --ink: #1f1f1f;
      --muted: #7b785b;
      --wood: #9a6a3f;
      --wood-mid: #7a4f2e;
      --wood-dark: #4f2f1b;
      --shelf-back: #d8c3a3;
      --leaf: #1f8d61;
      --leaf-soft: #b4d9ca;
      --leaf-dark: #176847;
      --gold: #f5d03e;
      --clay: #db5331;
      --cream: #fbfbf6;
      --line: rgba(79, 47, 27, 0.16);
      --shadow: 0 8px 32px rgba(47, 33, 19, 0.16);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "A+EqpB-游ゴシック体 Pr6N M", "Yu Gothic Medium", "YuGothic", "Hiragino Sans", sans-serif;
      background:
        radial-gradient(circle at 88% 7%, rgba(180, 217, 202, 0.62), transparent 24%),
        radial-gradient(circle at 8% 18%, rgba(245, 208, 62, 0.26), transparent 21%),
        linear-gradient(180deg, var(--paper) 0%, #f8f7ee 56%, #efe3ce 100%);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 34px 0 56px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
      gap: 24px;
      align-items: end;
      margin-bottom: 18px;
    }

    .title-wrap {
      padding: 28px 0 14px;
    }

    .eyebrow {
      width: max-content;
      margin: 0 0 10px;
      padding: 8px 16px;
      color: var(--cream);
      background: var(--leaf);
      border-radius: 999px;
      font-size: 0.8rem;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.8rem, 8vw, 6.8rem);
      line-height: 0.96;
      font-weight: 400;
      letter-spacing: 0;
      text-shadow: 0 8px 22px rgba(79, 47, 27, 0.16);
    }

    .subtitle {
      max-width: 680px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.25rem);
      line-height: 1.8;
    }

    .shelf-meter {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 18px;
      border: 0;
      border-radius: var(--radius);
      background: rgba(251, 251, 246, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }

    .meter-item {
      min-height: 88px;
      padding: 12px;
      border-radius: 14px;
      color: var(--cream);
      background: linear-gradient(135deg, var(--wood-mid), var(--wood-dark));
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .meter-item:nth-child(2) {
      background: var(--leaf);
    }

    .meter-item:nth-child(3) {
      color: var(--ink);
      background: var(--gold);
    }

    .meter-label {
      font-size: 0.78rem;
      color: currentColor;
      opacity: 0.8;
    }

    .meter-value {
      font-size: 1.9rem;
      font-weight: 800;
      line-height: 1;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 24px;
      align-items: start;
    }

    .board-panel,
    .side-panel {
      border: 0;
      border-radius: var(--radius);
      background: rgba(251, 251, 246, 0.86);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }

    .board-panel {
      padding: 24px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .panel-title {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 400;
    }

    .status {
      min-height: 42px;
      padding: 13px 16px;
      border-left: 5px solid var(--leaf);
      border-radius: 12px;
      background: rgba(180, 217, 202, 0.24);
      color: var(--leaf-dark);
      font-weight: 700;
      line-height: 1.45;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0 22px;
    }

    .btn {
      min-height: 44px;
      padding: 12px 18px;
      border-radius: 999px;
      color: var(--cream);
      background: var(--wood-dark);
      box-shadow: 0 4px 16px rgba(79, 47, 27, 0.16);
      font-weight: 700;
      transition: transform 180ms ease, filter 180ms ease, box-shadow 180ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
      box-shadow: 0 8px 24px rgba(79, 47, 27, 0.18);
    }

    .btn.secondary {
      color: var(--ink);
      background: var(--gold);
    }

    .btn.leaf {
      background: var(--leaf);
    }

    .btn.ghost {
      color: var(--wood-dark);
      background: transparent;
      border: 1px solid rgba(79, 47, 27, 0.28);
      box-shadow: none;
    }

    .bingo-grid,
    .library-shelf {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      padding: 18px;
      border-radius: 20px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.14), transparent 18%, rgba(0,0,0,0.08) 100%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.09) 0 7px, rgba(0,0,0,0.035) 7px 14px),
        linear-gradient(135deg, var(--wood), var(--wood-dark));
      box-shadow:
        inset 0 0 0 8px rgba(79, 47, 27, 0.32),
        inset 0 0 0 14px rgba(255, 255, 255, 0.12),
        0 18px 44px rgba(79, 47, 27, 0.24);
    }

    .bingo-grid {
      min-height: 660px;
    }

    .library-shelf {
      min-height: 0;
      margin-top: 12px;
    }

    .today-pick {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(130px, 190px) minmax(0, 1fr);
      gap: 18px;
      align-items: center;
      min-height: 250px;
      padding: 18px;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(48, 29, 16, 0.18), transparent 28%, rgba(255, 255, 255, 0.12)),
        linear-gradient(180deg, #e2cfb2, #c9aa7e);
      box-shadow:
        inset 0 -18px 0 rgba(79, 47, 27, 0.3),
        inset 8px 0 14px rgba(48, 29, 16, 0.14);
    }

    .today-pick .book-cover {
      width: min(88%, 180px);
    }

    .today-pick .actions {
      margin: 16px 0 0;
    }

    .pick-label {
      margin: 0 0 8px;
      color: var(--leaf-dark);
      font-size: 0.86rem;
      font-weight: 900;
    }

    .pick-title {
      margin: 0;
      font-size: clamp(1.6rem, 4vw, 3rem);
      line-height: 1.15;
      font-weight: 900;
    }

    .pick-author {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }

    .shelf-heading {
      grid-column: 1 / -1;
      margin: 2px 0 -2px;
      padding: 8px 10px;
      color: var(--cream);
      background: rgba(79, 47, 27, 0.72);
      border-radius: 6px;
      font-weight: 900;
    }

    .cell {
      position: relative;
      min-height: 198px;
      padding: 14px 14px 12px;
      overflow: hidden;
      border: 0;
      border-radius: 6px;
      background:
        linear-gradient(90deg, rgba(48, 29, 16, 0.2), transparent 20%, rgba(255, 255, 255, 0.11) 50%, rgba(48, 29, 16, 0.16)),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.06) 0 8px, rgba(0,0,0,0.035) 8px 16px),
        linear-gradient(180deg, #d7bd96, var(--shelf-back));
      box-shadow:
        inset 9px 0 13px rgba(48, 29, 16, 0.22),
        inset -8px 0 12px rgba(255, 255, 255, 0.13),
        inset 0 -14px 0 rgba(79, 47, 27, 0.32),
        inset 0 -18px 0 rgba(255, 255, 255, 0.08);
      transition: transform 180ms ease, filter 180ms ease;
    }

    .cell::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(0, 0, 0, 0.16)),
        linear-gradient(90deg, var(--wood-mid), var(--wood-dark));
      box-shadow: 0 -8px 18px rgba(48, 29, 16, 0.2);
      z-index: 0;
    }

    .cell > div {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .cell:not(.empty):hover {
      transform: translateY(-3px);
      filter: saturate(1.04) brightness(1.02);
    }

    .cell.empty {
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
      background:
        linear-gradient(90deg, rgba(48, 29, 16, 0.12), transparent 25%, rgba(255,255,255,0.12)),
        repeating-linear-gradient(90deg, rgba(79, 47, 27, 0.06) 0 12px, transparent 12px 24px),
        #d9c4a4;
    }

    .book-cover {
      position: relative;
      width: min(78%, 150px);
      margin: 0 auto;
      aspect-ratio: 4 / 5.45;
      overflow: hidden;
      border-radius: 4px;
      background: linear-gradient(145deg, #7d4b2d, #d9b56d);
      box-shadow:
        -8px 10px 16px rgba(48, 29, 16, 0.24),
        0 2px 0 rgba(255, 255, 255, 0.36) inset;
      transform: perspective(500px) rotateY(-3deg);
    }

    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .fake-cover {
      width: 100%;
      height: 100%;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #fff9e7;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.18) 0 12%, transparent 12%),
        linear-gradient(145deg, #6c4128, #1f8d61 62%, #f5d03e);
    }

    .fake-title {
      font-size: clamp(0.9rem, 1.6vw, 1.25rem);
      font-weight: 800;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .fake-author {
      font-size: 0.78rem;
      line-height: 1.35;
      opacity: 0.86;
      overflow-wrap: anywhere;
    }

    .book-meta {
      margin-top: 8px;
      padding: 8px 8px 10px;
      border-radius: 10px;
      background: rgba(251, 251, 246, 0.74);
      box-shadow: 0 6px 14px rgba(48, 29, 16, 0.08);
    }

    .book-title {
      margin: 0;
      font-size: 0.9rem;
      line-height: 1.35;
      font-weight: 700;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .book-author {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .cell.opened::after {
      content: "読了!";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--cream);
      background: rgba(31, 141, 97, 0.74);
      font-size: clamp(1.8rem, 4vw, 3.4rem);
      font-weight: 900;
      transform: rotate(-10deg);
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.24);
    }

    .cell.line-hit {
      box-shadow:
        0 0 0 4px rgba(245, 208, 62, 0.42),
        inset 9px 0 13px rgba(48, 29, 16, 0.22),
        inset -8px 0 12px rgba(255, 255, 255, 0.13),
        inset 0 -14px 0 rgba(79, 47, 27, 0.32),
        inset 0 -18px 0 rgba(255, 255, 255, 0.08);
    }

    .cell.read-book {
      filter: saturate(0.82);
    }

    .cell.read-book::after {
      content: "読了";
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 2;
      padding: 5px 9px;
      border-radius: 999px;
      color: var(--cream);
      background: var(--leaf);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .side-panel {
      padding: 18px;
      position: sticky;
      top: 16px;
    }

    .notice {
      margin: 0 0 14px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(180, 217, 202, 0.24);
      color: var(--leaf-dark);
      line-height: 1.7;
      font-size: 0.92rem;
    }

    .mini-list {
      display: grid;
      gap: 8px;
      max-height: 420px;
      overflow: auto;
      padding-right: 4px;
    }

    .mini-book {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 9px;
      align-items: center;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(251, 251, 246, 0.68);
    }

    .mini-thumb {
      width: 42px;
      aspect-ratio: 4 / 5.3;
      overflow: hidden;
      border-radius: 6px;
      background: var(--wood);
    }

    .mini-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .mini-title {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 800;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .mini-author {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.76rem;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(42, 30, 19, 0.62);
    }

    .modal.show {
      display: flex;
    }

    .dialog {
      width: min(900px, 100%);
      max-height: min(88vh, 860px);
      overflow: auto;
      border: 1px solid rgba(255, 250, 240, 0.42);
      border-radius: 16px;
      background: var(--cream);
      box-shadow: 0 24px 90px rgba(0, 0, 0, 0.36);
    }

    .dialog.small {
      width: min(560px, 100%);
    }

    .dialog-head {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(251, 251, 246, 0.95);
      backdrop-filter: blur(8px);
    }

    .dialog-head h2 {
      margin: 0;
      font-size: 1.28rem;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      color: var(--ink);
      background: var(--leaf-soft);
      font-size: 1.35rem;
      line-height: 1;
    }

    .dialog-body {
      padding: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 0.72fr) auto;
      gap: 10px;
      align-items: end;
    }

    .manual-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
      gap: 10px;
      align-items: end;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px dashed var(--line);
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--wood-dark);
      font-size: 0.82rem;
      font-weight: 800;
    }

    input {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid rgba(92, 56, 32, 0.26);
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    input:focus {
      border-color: var(--leaf);
      box-shadow: 0 0 0 3px rgba(31, 141, 97, 0.16);
    }

    .results,
    .library-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .result-card,
    .library-card {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(251, 251, 246, 0.7);
    }

    .result-card .mini-thumb,
    .library-card .mini-thumb {
      width: 58px;
    }

    .card-title {
      margin: 0;
      font-weight: 900;
      line-height: 1.35;
    }

    .card-sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .danger {
      background: var(--clay);
      color: var(--cream);
    }

    .empty-message {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .confirm-book {
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr);
      gap: 16px;
      align-items: center;
    }

    .confirm-book .book-cover {
      width: 132px;
    }

    .celebrate {
      display: grid;
      gap: 12px;
    }

    .celebrate-title {
      margin: 0;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--leaf-dark);
      line-height: 1.15;
    }

    .line-books {
      display: grid;
      gap: 8px;
    }

    .library-section {
      display: grid;
      gap: 10px;
    }

    .library-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--line);
      margin-bottom: 18px;
    }

    .library-tab {
      flex: 1;
      padding: 12px 16px;
      color: var(--muted);
      background: transparent;
      border-radius: 8px 8px 0 0;
      font-size: 0.95rem;
      font-weight: 700;
      transition: color 160ms ease, background 160ms ease;
      position: relative;
    }

    .library-tab::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -2px;
      height: 3px;
      border-radius: 3px 3px 0 0;
      background: transparent;
      transition: background 160ms ease;
    }

    .library-tab:hover {
      color: var(--wood-dark);
      background: rgba(154, 106, 63, 0.06);
    }

    .library-tab.active {
      color: var(--leaf-dark);
      background: rgba(180, 217, 202, 0.18);
    }

    .library-tab.active::after {
      background: var(--leaf);
    }

    .library-tab-count {
      display: inline-block;
      min-width: 22px;
      margin-left: 6px;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(79, 47, 27, 0.1);
      font-size: 0.78rem;
      font-weight: 900;
      line-height: 1.4;
      text-align: center;
    }

    .library-tab.active .library-tab-count {
      background: rgba(31, 141, 97, 0.16);
      color: var(--leaf-dark);
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      max-width: min(390px, calc(100% - 32px));
      padding: 12px 14px;
      border-radius: 7px;
      color: var(--cream);
      background: var(--wood-dark);
      box-shadow: var(--shadow);
      transform: translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      line-height: 1.55;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 900px) {
      .hero,
      .layout {
        grid-template-columns: 1fr;
      }

      .side-panel {
        position: static;
      }

      .bingo-grid {
        min-height: auto;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 18px, 1180px);
        padding-top: 12px;
      }

      .shelf-meter,
      .actions,
      .manual-grid {
        grid-template-columns: 1fr;
      }

      .bingo-grid {
        gap: 6px;
      }

      .library-shelf {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .today-pick {
        grid-template-columns: 1fr;
      }

      .board-panel {
        padding: 10px;
      }

      .cell {
        min-height: 168px;
        padding: 6px;
      }

      .book-title {
        font-size: 0.78rem;
      }

      .book-author {
        font-size: 0.68rem;
      }

      .form-grid,
      .result-card,
      .library-card,
      .confirm-book {
        grid-template-columns: 1fr;
      }

      .result-card .mini-thumb,
      .library-card .mini-thumb,
      .confirm-book .book-cover {
        width: 96px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero" aria-labelledby="appTitle">
      <div class="title-wrap">
        <p class="eyebrow">今日、開いてみる1冊を選ぼう。</p>
        <h1 id="appTitle">積読<br>ルーレット</h1>
        <p class="subtitle">読めない本棚を、選べる本棚に。登録した積読からランダムに1冊を出して、読了した本は読了棚へ移します。</p>
      </div>
      <div class="shelf-meter" aria-label="本棚の状態">
        <div class="meter-item">
          <span class="meter-label">未読の本</span>
          <strong class="meter-value" id="bookCount">0</strong>
        </div>
        <div class="meter-item">
          <span class="meter-label">読了した本</span>
          <strong class="meter-value" id="openedCount">0</strong>
        </div>
        <div class="meter-item">
          <span class="meter-label">登録した本</span>
          <strong class="meter-value" id="lineCount">0</strong>
        </div>
      </div>
    </section>

    <section class="layout">
      <div class="board-panel">
        <div class="panel-head">
          <h2 class="panel-title">今日開いてみる本</h2>
        </div>
        <div class="status" id="statusText">本を登録すると、今日開いてみる1冊を選べます。</div>
        <div class="actions">
          <button class="btn leaf" id="openAdd">本を追加</button>
          <button class="btn" id="openLibrary">本棚を編集</button>
          <button class="btn secondary" id="createBingo">今日の1冊を選ぶ</button>
          <button class="btn ghost" id="resetBingo">選び直す</button>
        </div>
        <div class="bingo-grid" id="bingoGrid" aria-live="polite"></div>
      </div>

      <aside class="side-panel">
        <p class="notice">タイトル・作者検索にはNDLサーチAPI、書誌と書影の補完にはopenBDを利用します。本棚と読了状態はこのブラウザ内だけに保存されます。</p>
        <h2 class="panel-title">読了棚</h2>
        <div class="mini-list" id="miniList"></div>
      </aside>
    </section>
  </main>

  <div class="modal" id="addModal" role="dialog" aria-modal="true" aria-labelledby="addTitle">
    <div class="dialog">
      <div class="dialog-head">
        <h2 id="addTitle">本を追加</h2>
        <button class="icon-btn" data-close="addModal" aria-label="閉じる">×</button>
      </div>
      <div class="dialog-body">
        <div class="form-grid">
          <label>本のタイトルで検索
            <input id="searchInput" type="search" placeholder="例：論語、吾輩は猫である">
          </label>
          <label>作者名 任意
            <input id="authorInput" type="search" placeholder="例：夏目漱石">
          </label>
          <button class="btn leaf" id="searchBooks">検索</button>
        </div>
        <div id="searchMessage" class="empty-message" style="display:none;"></div>
        <div class="results" id="searchResults"></div>

        <div class="manual-grid">
          <label>手入力タイトル
            <input id="manualTitle" type="text" placeholder="例：読みたい本">
          </label>
          <label>著者
            <input id="manualAuthor" type="text" placeholder="例：著者名">
          </label>
          <label>表紙URL 任意
            <input id="manualCover" type="url" placeholder="https://...">
          </label>
          <button class="btn secondary" id="addManual">追加</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="libraryModal" role="dialog" aria-modal="true" aria-labelledby="libraryTitle">
    <div class="dialog">
      <div class="dialog-head">
        <h2 id="libraryTitle">本棚を編集</h2>
        <button class="icon-btn" data-close="libraryModal" aria-label="閉じる">×</button>
      </div>
      <div class="dialog-body">
        <div class="library-list" id="libraryList"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="confirmModal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="dialog small">
      <div class="dialog-head">
        <h2 id="confirmTitle">本の状態</h2>
        <button class="icon-btn" data-close="confirmModal" aria-label="閉じる">×</button>
      </div>
      <div class="dialog-body">
        <div class="confirm-book" id="confirmBook"></div>
        <div class="actions" style="grid-template-columns: 1fr 1fr;">
          <button class="btn leaf" id="markRead">読了にする</button>
          <button class="btn ghost" id="markUnread">まだ読んでない</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const BOOKS_KEY = "tsundoku_books";
    const STATE_KEY = "tsundoku_bingo_state";

    const els = {
      bookCount: document.getElementById("bookCount"),
      openedCount: document.getElementById("openedCount"),
      lineCount: document.getElementById("lineCount"),
      statusText: document.getElementById("statusText"),
      bingoGrid: document.getElementById("bingoGrid"),
      miniList: document.getElementById("miniList"),
      libraryList: document.getElementById("libraryList"),
      addModal: document.getElementById("addModal"),
      libraryModal: document.getElementById("libraryModal"),
      confirmModal: document.getElementById("confirmModal"),
      searchInput: document.getElementById("searchInput"),
      authorInput: document.getElementById("authorInput"),
      searchMessage: document.getElementById("searchMessage"),
      searchResults: document.getElementById("searchResults"),
      manualTitle: document.getElementById("manualTitle"),
      manualAuthor: document.getElementById("manualAuthor"),
      manualCover: document.getElementById("manualCover"),
      confirmBook: document.getElementById("confirmBook"),
      toast: document.getElementById("toast"),
      markRead: document.getElementById("markRead"),
      markUnread: document.getElementById("markUnread")
    };

    let books = loadBooks();
    let state = loadState();
    let selectedCell = null;
    let toastTimer = null;
    let activeSearchId = 0;
    let activeSearchController = null;
    let libraryActiveTab = "unread";

    document.getElementById("openAdd").addEventListener("click", () => openModal("addModal"));
    document.getElementById("openLibrary").addEventListener("click", () => {
      renderLibrary();
      openModal("libraryModal");
    });
    document.getElementById("createBingo").addEventListener("click", createBingo);
    document.getElementById("resetBingo").addEventListener("click", resetBingo);
    document.getElementById("searchBooks").addEventListener("click", searchBooks);
    document.getElementById("addManual").addEventListener("click", addManualBook);
    document.getElementById("markRead").addEventListener("click", markSelectedRead);
    document.getElementById("markUnread").addEventListener("click", markSelectedUnread);
    els.searchInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") searchBooks();
    });
    els.authorInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") searchBooks();
    });

    document.querySelectorAll("[data-close]").forEach((button) => {
      button.addEventListener("click", () => closeModal(button.dataset.close));
    });

    document.querySelectorAll(".modal").forEach((modal) => {
      modal.addEventListener("click", (event) => {
        if (event.target === modal) closeModal(modal.id);
      });
    });

    render();

    function loadBooks() {
      try {
        return JSON.parse(localStorage.getItem(BOOKS_KEY) || "[]").map((book) => ({
          ...book,
          status: book.status === "read" ? "read" : "unread"
        }));
      } catch {
        return [];
      }
    }

    function loadState() {
      const fallback = { featuredBookId: null, pickedAt: null };
      try {
        const saved = JSON.parse(localStorage.getItem(STATE_KEY) || "{}");
        return {
          ...fallback,
          featuredBookId: saved.featuredBookId || null,
          pickedAt: saved.pickedAt || saved.createdAt || null
        };
      } catch {
        return fallback;
      }
    }

    function saveBooks() {
      try {
        localStorage.setItem(BOOKS_KEY, JSON.stringify(books));
        return true;
      } catch {
        showToast("保存容量がいっぱいです。不要な本を削除してから、もう一度試してください。");
        return false;
      }
    }

    function saveState() {
      try {
        localStorage.setItem(STATE_KEY, JSON.stringify(state));
        return true;
      } catch {
        showToast("保存容量がいっぱいです。不要な本を削除してから、もう一度試してください。");
        return false;
      }
    }

    function render() {
      const unreadBooks = getUnreadBooks();
      const readBooks = getReadBooks();
      els.bookCount.textContent = unreadBooks.length;
      els.openedCount.textContent = readBooks.length;
      els.lineCount.textContent = books.length;
      renderStatus();
      renderBingo();
      renderMiniList();
      renderLibrary();
    }

    function renderStatus() {
      const unreadBooks = getUnreadBooks();
      const featuredBook = getFeaturedBook();
      if (!unreadBooks.length) {
        els.statusText.textContent = books.length
          ? "未読の本がありません。読了棚から未読に戻すか、本を追加してください。"
          : "本を登録すると、今日開いてみる1冊を選べます。";
        return;
      }
      if (featuredBook) {
        els.statusText.textContent = `今日は「${featuredBook.title}」を開いてみませんか。`;
        return;
      }
      els.statusText.textContent = "未読棚から、今日開いてみる1冊をランダムに選べます。";
    }

    function renderBingo() {
      els.bingoGrid.innerHTML = "";
      const unreadBooks = getUnreadBooks();
      const featuredBook = getFeaturedBook();

      els.bingoGrid.appendChild(createTodayPick(featuredBook));
      const heading = document.createElement("div");
      heading.className = "shelf-heading";
      heading.textContent = `未読棚 ${unreadBooks.length}冊`;
      els.bingoGrid.appendChild(heading);

      if (!unreadBooks.length) {
        const cell = document.createElement("div");
        cell.className = "cell empty";
        cell.textContent = books.length ? "未読の本はありません。" : "本を追加すると、ここに未読棚ができます。";
        els.bingoGrid.appendChild(cell);
        return;
      }

      unreadBooks.forEach((book) => {
        els.bingoGrid.appendChild(createShelfCell(book));
      });
    }

    function renderMiniList() {
      els.miniList.innerHTML = "";
      const readBooks = getReadBooks();
      if (!readBooks.length) {
        els.miniList.innerHTML = '<div class="empty-message">読了した本はまだありません。</div>';
        return;
      }
      readBooks.slice(0, 16).forEach((book) => {
        const row = document.createElement("div");
        row.className = "mini-book";
        row.appendChild(createThumb(book));
        row.appendChild(createMiniMeta(book));
        els.miniList.appendChild(row);
      });
    }

    function renderLibrary() {
      els.libraryList.innerHTML = "";
      if (!books.length) {
        els.libraryList.innerHTML = '<div class="empty-message">本を追加すると、ここで削除できます。</div>';
        return;
      }
      const unreadBooks = getUnreadBooks();
      const readBooks = getReadBooks();

      const tabs = document.createElement("div");
      tabs.className = "library-tabs";
      tabs.setAttribute("role", "tablist");

      const unreadTab = document.createElement("button");
      unreadTab.className = `library-tab${libraryActiveTab === "unread" ? " active" : ""}`;
      unreadTab.setAttribute("role", "tab");
      unreadTab.setAttribute("aria-selected", libraryActiveTab === "unread");
      unreadTab.innerHTML = `未読の本棚<span class="library-tab-count">${unreadBooks.length}</span>`;
      unreadTab.addEventListener("click", () => { libraryActiveTab = "unread"; renderLibrary(); });

      const readTab = document.createElement("button");
      readTab.className = `library-tab${libraryActiveTab === "read" ? " active" : ""}`;
      readTab.setAttribute("role", "tab");
      readTab.setAttribute("aria-selected", libraryActiveTab === "read");
      readTab.innerHTML = `読了の本棚<span class="library-tab-count">${readBooks.length}</span>`;
      readTab.addEventListener("click", () => { libraryActiveTab = "read"; renderLibrary(); });

      tabs.append(unreadTab, readTab);
      els.libraryList.appendChild(tabs);

      const activeBooks = libraryActiveTab === "unread" ? unreadBooks : readBooks;
      const shelf = document.createElement("div");
      shelf.className = "library-shelf";
      if (!activeBooks.length) {
        const empty = document.createElement("div");
        empty.className = "cell empty";
        empty.textContent = libraryActiveTab === "unread"
          ? "未読の本はありません。"
          : "読了した本はまだありません。";
        shelf.appendChild(empty);
      } else {
        activeBooks.forEach((book) => shelf.appendChild(createShelfCell(book, true)));
      }
      els.libraryList.appendChild(shelf);
    }

    function createTodayPick(book) {
      const wrap = document.createElement("div");
      wrap.className = "today-pick";
      if (!book) {
        const cover = document.createElement("div");
        cover.className = "book-cover";
        cover.appendChild(createFakeCover({ title: "今日の1冊", author: "未選択" }));
        const text = document.createElement("div");
        const label = document.createElement("p");
        label.className = "pick-label";
        label.textContent = "今日の候補";
        const title = document.createElement("h3");
        title.className = "pick-title";
        title.textContent = "まだ選ばれていません";
        const lead = document.createElement("p");
        lead.className = "pick-author";
        lead.textContent = getUnreadBooks().length ? "「今日の1冊を選ぶ」を押すと、未読棚からランダムに選びます。" : "本を追加すると、ここに候補が出ます。";
        text.append(label, title, lead);
        wrap.append(cover, text);
        return wrap;
      }

      wrap.appendChild(createCover(book));
      const text = document.createElement("div");
      const label = document.createElement("p");
      label.className = "pick-label";
      label.textContent = "今日開いてみる本";
      const title = document.createElement("h3");
      title.className = "pick-title";
      title.textContent = book.title;
      const author = document.createElement("p");
      author.className = "pick-author";
      author.textContent = book.author || "著者不明";
      const actions = document.createElement("div");
      actions.className = "actions";
      actions.style.gridTemplateColumns = "minmax(0, 1fr) minmax(0, 1fr)";
      const read = document.createElement("button");
      read.className = "btn leaf";
      read.textContent = "読了にする";
      read.addEventListener("click", () => openReadConfirm(book.id));
      const again = document.createElement("button");
      again.className = "btn ghost";
      again.textContent = "もう一度選ぶ";
      again.addEventListener("click", createBingo);
      actions.append(read, again);
      text.append(label, title, author, actions);
      wrap.appendChild(text);
      return wrap;
    }

    function createShelfCell(book, withDelete = false) {
      const cell = document.createElement(withDelete ? "div" : "button");
      if (!withDelete) cell.type = "button";
      cell.className = `cell ${book.status === "read" ? "read-book" : ""}`;
      cell.appendChild(createBookView(book));
      cell.addEventListener("click", () => openReadConfirm(book.id));
      if (withDelete) {
        cell.setAttribute("role", "button");
        cell.tabIndex = 0;
        cell.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") openReadConfirm(book.id);
        });
        const remove = document.createElement("button");
        remove.type = "button";
        remove.className = "btn danger";
        remove.textContent = "削除";
        remove.style.position = "absolute";
        remove.style.left = "12px";
        remove.style.top = "12px";
        remove.style.zIndex = "3";
        remove.style.minHeight = "34px";
        remove.style.padding = "6px 10px";
        remove.addEventListener("click", (event) => {
          event.stopPropagation();
          deleteBook(book.id);
        });
        cell.appendChild(remove);
      }
      return cell;
    }

    function createBookView(book) {
      const wrap = document.createElement("div");
      wrap.appendChild(createCover(book));
      const meta = document.createElement("div");
      meta.className = "book-meta";
      const title = document.createElement("p");
      title.className = "book-title";
      title.textContent = book.title;
      const author = document.createElement("p");
      author.className = "book-author";
      author.textContent = book.author || "著者不明";
      meta.append(title, author);
      wrap.appendChild(meta);
      return wrap;
    }

    function createCover(book) {
      const cover = document.createElement("div");
      cover.className = "book-cover";
      if (book.coverUrl) {
        const img = document.createElement("img");
        img.src = book.coverUrl;
        img.alt = `${book.title}の表紙`;
        img.loading = "lazy";
        img.onerror = () => {
          cover.innerHTML = "";
          cover.appendChild(createFakeCover(book));
        };
        cover.appendChild(img);
      } else {
        cover.appendChild(createFakeCover(book));
      }
      return cover;
    }

    function createFakeCover(book) {
      const fake = document.createElement("div");
      fake.className = "fake-cover";
      const title = document.createElement("div");
      title.className = "fake-title";
      title.textContent = book.title || "タイトルなし";
      const author = document.createElement("div");
      author.className = "fake-author";
      author.textContent = book.author || "著者不明";
      fake.append(title, author);
      return fake;
    }

    function createThumb(book) {
      const thumb = document.createElement("div");
      thumb.className = "mini-thumb";
      if (book.coverUrl) {
        const img = document.createElement("img");
        img.src = book.coverUrl;
        img.alt = "";
        img.loading = "lazy";
        img.onerror = () => {
          thumb.innerHTML = "";
          thumb.appendChild(createFakeCover(book));
        };
        thumb.appendChild(img);
      } else {
        thumb.appendChild(createFakeCover(book));
      }
      return thumb;
    }

    function createMiniMeta(book) {
      const meta = document.createElement("div");
      const title = document.createElement("p");
      title.className = "mini-title";
      title.textContent = book.title;
      const author = document.createElement("p");
      author.className = "mini-author";
      author.textContent = book.author || "著者不明";
      meta.append(title, author);
      return meta;
    }

    async function searchBooks() {
      const titleQuery = els.searchInput.value.trim();
      const authorQuery = els.authorInput.value.trim();
      const searchId = activeSearchId + 1;
      activeSearchId = searchId;
      if (activeSearchController) activeSearchController.abort();
      activeSearchController = new AbortController();
      const { signal } = activeSearchController;
      els.searchResults.innerHTML = "";
      setSearchMessage("");
      if (!titleQuery && !authorQuery) {
        setSearchMessage("本のタイトルか作者名を入力してください。");
        return;
      }

      document.getElementById("searchBooks").disabled = false;
      setSearchMessage("NDLサーチで候補を探し、ISBNがある本はopenBDで書誌と書影を補完しています。");
      try {
        const ndlCandidates = await searchNdlsForBooks(titleQuery, authorQuery, signal);
        if (searchId !== activeSearchId) return;
        if (!ndlCandidates.length) {
          setSearchMessage("本が見つかりませんでした。タイトルや作者名を短くするか、手入力で追加してください。");
          return;
        }

        const books = await enrichBooksWithOpenBd(ndlCandidates, signal);
        if (searchId !== activeSearchId) return;
        const hasFallbackOnly = books.every((book) => !book.coverUrl);

        setSearchMessage(hasFallbackOnly ? "書影がない候補は仮表紙で表示しています。" : "");
        books.forEach((book) => renderSearchResult(book));
      } catch (error) {
        if (error.name === "AbortError" || searchId !== activeSearchId) return;
        console.error("Book search failed", error);
        setSearchMessage("本を検索できませんでした。通信環境を確認するか、手入力で追加してください。");
      } finally {
        if (searchId === activeSearchId) {
          document.getElementById("searchBooks").disabled = false;
          activeSearchController = null;
        }
      }
    }

    async function searchNdlsForBooks(title, author, signal) {
      const params = new URLSearchParams({
        cnt: "250",
        dpid: "iss-ndl-opac"
      });
      if (title) params.set("title", title);
      if (author) params.set("creator", author);
      const url = `https://ndlsearch.ndl.go.jp/api/opensearch?${params.toString()}`;
      const response = await fetch(url, { signal });
      if (!response.ok) throw new Error("NDL search failed");
      const xmlText = await response.text();
      const doc = new DOMParser().parseFromString(xmlText, "application/xml");
      const items = Array.from(doc.querySelectorAll("item"));
      const candidates = [];

      items.forEach((item) => {
        const itemTitle = cleanDisplayText(getXmlText(item, "dc:title") || getXmlText(item, "title"));
        const itemText = cleanDisplayText(item.textContent || "");
        const creators = Array.from(item.getElementsByTagName("dc:creator"))
          .map((creator) => cleanDisplayText(creator.textContent || ""))
          .join(" ");
        const authorText = cleanDisplayText(getXmlText(item, "author"));
        const publisher = cleanDisplayText(getXmlText(item, "dc:publisher"));
        const date = cleanDisplayText(getXmlText(item, "dc:date") || getXmlText(item, "dcterms:issued"));
        const materialType = detectMaterialType(itemText);
        const identifiers = Array.from(item.getElementsByTagName("dc:identifier"));
        const isbnValues = [];
        identifiers.forEach((identifier) => {
          const type = identifier.getAttribute("xsi:type") || "";
          if (!type.includes("ISBN")) return;
          const isbn = normalizeIsbn(identifier.textContent || "");
          if (isbn && !isbnValues.includes(isbn)) isbnValues.push(isbn);
        });

        const score = scoreSearchMatch({
          title: itemTitle,
          text: itemText,
          creators: creators || authorText,
          titleQuery: title,
          authorQuery: author
        });
        if (!itemTitle || score < 10) return;

        const candidateAuthor = pickMatchedAuthor(creators || authorText, itemText, author) || cleanAuthor(creators || authorText);
        const candidate = {
          id: createId(),
          title: itemTitle,
          author: candidateAuthor,
          coverId: null,
          coverUrl: null,
          isbn: isbnValues[0] || "",
          publisher,
          publishedAt: date,
          materialType,
          source: "NDLサーチ",
          status: "unread",
          createdAt: new Date().toISOString(),
          score: score + scoreBibliographicQuality({ title: itemTitle, author: candidateAuthor, publisher, materialType, isbn: isbnValues[0] || "" })
        };

        const duplicateKey = candidate.isbn || `${normalizeSearchText(candidate.title)}:${normalizeSearchText(candidate.author)}:${candidate.publishedAt}`;
        if (!candidates.some((existing) => existing.searchKey === duplicateKey)) {
          candidate.searchKey = duplicateKey;
          candidates.push(candidate);
        }

        const workCandidate = createMatchedWorkCandidate({
          queryTitle: title,
          queryAuthor: author,
          itemTitle,
          itemText,
          creators,
          authorText,
          publisher,
          date
        });
        if (workCandidate) upsertCandidate(candidates, workCandidate);
      });

      return candidates
        .sort((a, b) => compareSearchCandidates(a, b, title))
        .slice(0, 24);
    }

    function createMatchedWorkCandidate({ queryTitle, queryAuthor, itemTitle, itemText, creators, authorText, publisher, date }) {
      if (!queryTitle) return null;
      const normalizedQuery = normalizeSearchText(queryTitle);
      const normalizedTitle = normalizeSearchText(itemTitle);
      if (!normalizedQuery || normalizedTitle !== normalizedQuery) return null;
      const author = pickMatchedAuthor(creators || authorText, itemText, queryAuthor);
      const materialType = detectMaterialType(itemText);

      return {
        id: createId(),
        title: cleanDisplayText(itemTitle || queryTitle),
        author,
        coverId: null,
        coverUrl: null,
        isbn: "",
        publisher,
        publishedAt: date,
        materialType,
        source: "NDLサーチ",
        status: "unread",
        createdAt: new Date().toISOString(),
        score: 1200 + scoreBibliographicQuality({ title: itemTitle, author, publisher, materialType, isbn: "" }) + (queryAuthor && normalizeSearchText(author).includes(normalizeSearchText(queryAuthor)) ? 80 : 0),
        searchKey: `matched:${normalizedQuery}:${normalizeSearchText(author)}`
      };
    }

    function upsertCandidate(candidates, candidate) {
      const index = candidates.findIndex((existing) => existing.searchKey === candidate.searchKey);
      if (index === -1) {
        candidates.push(candidate);
        return;
      }
      if (candidate.score > candidates[index].score) candidates[index] = candidate;
    }

    function getXmlText(parent, tagName) {
      const node = parent.getElementsByTagName(tagName)[0];
      return node ? node.textContent.trim() : "";
    }

    function scoreSearchMatch({ title, text, creators, titleQuery, authorQuery }) {
      const titleScore = titleQuery ? scoreTitleMatch(title, text, titleQuery) : 20;
      const authorScore = authorQuery ? scoreAuthorMatch(creators || text, authorQuery) : 0;
      return titleScore + authorScore;
    }

    function scoreAuthorMatch(candidateText, query) {
      const normalizedText = normalizeSearchText(candidateText);
      const normalizedQuery = normalizeSearchText(query);
      if (!normalizedText || !normalizedQuery) return 0;
      if (normalizedText.includes(normalizedQuery)) return 40;
      return 0;
    }

    function scoreTitleMatch(candidateTitle, candidateText, query) {
      const normalizedTitle = normalizeSearchText(candidateTitle);
      const normalizedText = normalizeSearchText(candidateText);
      const normalizedQuery = normalizeSearchText(query);
      if (!normalizedQuery) return 0;
      if (normalizedTitle === normalizedQuery) return 1000;
      if (containsStandaloneTitle(candidateTitle, query)) return 650;
      if (normalizedTitle.startsWith(normalizedQuery)) return 700;
      if (normalizedTitle.includes(normalizedQuery)) return 500;
      if (normalizedText.includes(normalizedQuery)) return 180;
      return 0;
    }

    function compareSearchCandidates(a, b, titleQuery) {
      const query = normalizeSearchText(titleQuery);
      const rank = (book) => {
        if (!query) return 1;
        const title = normalizeSearchText(book.title);
        const periodical = isPeriodicalCandidate(book);
        if (title === query && !periodical) return 0;
        if (containsStandaloneTitle(book.title, titleQuery) && !periodical) return 1;
        if (title.includes(query) && !periodical) return 2;
        if (title === query) return 3;
        if (title.includes(query)) return 4;
        return 5;
      };
      const rankDiff = rank(a) - rank(b);
      if (rankDiff) return rankDiff;
      return b.score - a.score;
    }

    function containsStandaloneTitle(title, query) {
      const displayTitle = cleanDisplayText(title).normalize("NFKC");
      const displayQuery = cleanDisplayText(query).normalize("NFKC");
      if (!displayTitle || !displayQuery) return false;
      const escaped = displayQuery.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return new RegExp(`(^|[\\s『』「」【】（）()［］\\[\\]・:：,，.．、。!！?？/／-])${escaped}($|[\\s『』「」【】（）()［］\\[\\]・:：,，.．、。!！?？/／-])`).test(displayTitle);
    }

    function detectMaterialType(text) {
      const value = cleanDisplayText(text);
      if (/(^|\s)雑誌(\s|$)/.test(value)) return "雑誌";
      if (/(^|\s)録音資料(\s|$)|オーディオブック|CD/.test(value)) return "録音資料";
      if (/(^|\s)映像資料(\s|$)|DVD|Blu-ray/.test(value)) return "映像資料";
      if (/(^|\s)電子資料(\s|$)/.test(value)) return "電子資料";
      if (/(^|\s)図書(\s|$)/.test(value)) return "図書";
      return "";
    }

    function scoreBibliographicQuality(book) {
      let score = 0;
      if (book.isbn) score += 90;
      if (book.materialType === "図書") score += 140;
      if (book.materialType === "雑誌") score -= 650;
      if (book.materialType === "録音資料" || book.materialType === "映像資料") score -= 80;
      if (hasPersonLikeAuthor(book.author)) score += 120;
      if (!cleanAuthor(book.author)) score -= 120;
      if (isCorporateLikeAuthor(book.author, book.title, book.publisher)) score -= 180;
      if (isSecondaryWorkTitle(book.title)) score -= 360;
      if (isMusicRelatedTitle(book.title)) score -= 360;
      if (isPhotoOrCatalogTitle(book.title)) score -= 180;
      return score;
    }

    function isPeriodicalCandidate(book) {
      return book.materialType === "雑誌" || isCorporateLikeAuthor(book.author, book.title, book.publisher);
    }

    function isSecondaryWorkTitle(title) {
      return /(作品論集|論集|研究|ルーツ|諸相|時代|青春|草稿|展示図録|展|評伝|解説|鑑賞|入門|論考|考察)/.test(cleanDisplayText(title));
    }

    function isMusicRelatedTitle(title) {
      return /(合唱|混声|女声|男声|楽譜|うた[:：]|ソング|song|Song|歌曲)/.test(cleanDisplayText(title));
    }

    function isPhotoOrCatalogTitle(title) {
      return /(写真集|図録|カタログ|catalog|Catalog)/.test(cleanDisplayText(title));
    }

    function hasPersonLikeAuthor(author) {
      const value = cleanAuthor(author);
      if (!value) return false;
      if (isCorporateLikeAuthor(value, "", "")) return false;
      return /[\p{Script=Han}\p{Script=Hiragana}\p{Script=Katakana}A-Za-z]/u.test(value);
    }

    function isCorporateLikeAuthor(author, title, publisher) {
      const value = normalizeSearchText(author);
      if (!value) return false;
      const normalizedTitle = normalizeSearchText(title);
      const normalizedPublisher = normalizeSearchText(publisher);
      if (normalizedTitle && value.includes(normalizedTitle) && normalizedPublisher && normalizedPublisher.includes(normalizedTitle)) return true;
      return /(社|協会|会|委員会|編集部|研究会|出版|新聞|雑誌|財団|法人|株式会社|有限会社)$/.test(value);
    }

    function normalizeSearchText(value) {
      return String(value)
        .replace(/<[^>]*>/g, " ")
        .normalize("NFKC")
        .replace(/\s+/g, "")
        .replace(/[『』「」【】（）()［］\[\]・:：,，.．、。!！?？]/g, "")
        .toLowerCase();
    }

    function cleanDisplayText(value) {
      return String(value || "")
        .replace(/<[^>]*>/g, " ")
        .replace(/&nbsp;/g, " ")
        .replace(/&amp;/g, "&")
        .replace(/&lt;/g, "<")
        .replace(/&gt;/g, ">")
        .replace(/&quot;/g, "\"")
        .replace(/&#39;/g, "'")
        .replace(/https?:\/\/\S+/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function cleanAuthor(value) {
      const text = cleanDisplayText(value)
        .replace(/\b\d{4}\s*-\s*(?:\d{4})?\b/g, "")
        .replace(/\s+(?:NDC(?:\(\d+\))?[:：].*|図書\s+.*|紙\s+.*|電子資料\s+.*|録音資料\s+.*|映像資料\s+.*|(?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)\s+.*)$/i, "")
        .replace(/\s*(?:著|作|原作|原|文|編著|編|訳|監修|編集|校注|解説|脚本|監督)\s*/g, " ")
        .replace(/[［\[]\s*[］\]]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
      if (!text) return "";

      const commaParts = text.split(",").map((part) => part.trim()).filter(Boolean);
      const names = [];
      if (commaParts.length > 1) {
        for (let i = 0; i < commaParts.length; i += 1) {
          const current = commaParts[i];
          const next = commaParts[i + 1] || "";
          if (!current || /^\d{4}/.test(current)) continue;
          if (next && !/^\d{4}/.test(next)) {
            names.push(`${current} ${next}`.trim());
            i += 1;
          } else {
            names.push(current);
          }
        }
      } else {
        names.push(...text.split(/[／/;；、]/).map((part) => part.trim()));
      }

      return names
        .map((name) => name.replace(/\s+/g, " ").trim())
        .filter(Boolean)
        .filter((name) => !/^(責任表示|シリーズ名|NDC)$/.test(name))
        .filter((name, index, parts) => parts.indexOf(name) === index)
        .slice(0, 3)
        .join(", ");
    }

    function pickMatchedAuthor(creators, text, queryAuthor) {
      const cleanedCreators = cleanDisplayText(creators);
      const cleanedText = cleanDisplayText(text);
      if (queryAuthor && normalizeSearchText(`${cleanedCreators} ${cleanedText}`).includes(normalizeSearchText(queryAuthor))) {
        return queryAuthor;
      }
      const responsibility = extractResponsibility(cleanedText);
      return pickPrimaryAuthor(responsibility) || cleanAuthor(cleanedCreators);
    }

    function extractResponsibility(text) {
      const match = cleanDisplayText(text).match(/責任表示[:：]\s*(.+?)(?:\s+(?:シリーズ名|NDC|ISBN|出版者|出版年月日)[:：]|$)/);
      return match ? match[1].trim() : "";
    }

    function pickPrimaryAuthor(text) {
      const cleaned = cleanDisplayText(text);
      if (!cleaned) return "";
      const rolePriority = ["著", "作", "原作", "原", "文", "編著", "校注", "脚本", "監督", "訳", "編", "監修", "編集", "解説"];
      for (const role of rolePriority) {
        const match = cleaned.match(new RegExp(`([^,，／/;；、]+?)\\s*${role}(?:\\s|$|[,，／/;；、])`));
        if (match) return cleanAuthor(match[1]);
      }
      return cleanAuthor(cleaned);
    }

    async function enrichBooksWithOpenBd(candidates, signal) {
      const isbnCandidates = candidates.filter((book) => book.isbn);
      if (!isbnCandidates.length) return candidates;
      const openBdBooks = await fetchOpenBdBooks(isbnCandidates.map((book) => book.isbn), signal);
      const openBdByIsbn = new Map(openBdBooks.map((book) => [book.isbn, book]));

      return candidates.map((candidate) => {
        const openBdBook = openBdByIsbn.get(candidate.isbn);
        if (!openBdBook) return candidate;
        return {
          ...candidate,
          title: openBdBook.title || candidate.title,
          author: openBdBook.author || candidate.author,
          coverUrl: openBdBook.coverUrl || candidate.coverUrl,
          publisher: openBdBook.publisher || candidate.publisher,
          source: "openBD"
        };
      });
    }

    async function fetchOpenBdBooks(isbns, signal) {
      const booksByIsbn = new Map();
      for (let i = 0; i < isbns.length; i += 10) {
        const chunk = isbns.slice(i, i + 10);
        const url = `https://api.openbd.jp/v1/get?isbn=${encodeURIComponent(chunk.join(","))}`;
        const response = await fetch(url, { signal });
        if (!response.ok) throw new Error("openBD failed");
        const data = await response.json();
        data.filter(Boolean).forEach((item) => {
          const book = normalizeOpenBdBook(item);
          if (book && !booksByIsbn.has(book.isbn)) booksByIsbn.set(book.isbn, book);
        });
      }
      return Array.from(booksByIsbn.values());
    }

    function normalizeIsbn(value) {
      const isbn = String(value).replace(/[^0-9Xx]/g, "").toUpperCase();
      if (isbn.length === 10 || isbn.length === 13) return isbn;
      return "";
    }

    function normalizeOpenBdBook(item) {
      const summary = item.summary || {};
      const onix = item.onix || {};
      const descriptive = onix.DescriptiveDetail || {};
      const contributors = descriptive.Contributor || [];
      const authors = contributors
        .map((person) => person.PersonName?.content || person.PersonName || "")
        .filter(Boolean);
      const title = summary.title || descriptive.TitleDetail?.TitleElement?.TitleText?.content || "";
      const isbn = normalizeIsbn(summary.isbn || "");
      if (!title || !isbn) return null;

      return {
        id: createId(),
        title,
        author: cleanAuthor(summary.author || authors.join(", ") || ""),
        coverId: null,
        coverUrl: normalizeCoverUrl(summary.cover),
        isbn,
        publisher: summary.publisher || "",
        status: "unread",
        createdAt: new Date().toISOString()
      };
    }

    function normalizeCoverUrl(value) {
      const url = String(value || "").trim();
      if (!url) return null;
      if (url.startsWith("//")) return `https:${url}`;
      if (url.startsWith("http://cover.openbd.jp/")) return url.replace("http://", "https://");
      return url;
    }

    function renderSearchResult(book) {
      const row = document.createElement("div");
      row.className = "result-card";
      row.appendChild(createThumb(book));

      const meta = document.createElement("div");
      const title = document.createElement("p");
      title.className = "card-title";
      title.textContent = book.title;
      const sub = document.createElement("p");
      sub.className = "card-sub";
      sub.textContent = [
        book.author || "著者不明",
        book.publisher || "",
        book.publishedAt || "",
        book.isbn ? `ISBN ${book.isbn}` : "ISBNなし",
        book.coverUrl ? "書影あり" : "仮表紙"
      ].filter(Boolean).join(" / ");
      meta.append(title, sub);
      row.appendChild(meta);

      const add = document.createElement("button");
      add.className = "btn leaf";
      add.textContent = "追加";
      add.addEventListener("click", () => addBook(book));
      row.appendChild(add);
      els.searchResults.appendChild(row);
    }

    function addManualBook() {
      const title = els.manualTitle.value.trim();
      const author = els.manualAuthor.value.trim();
      const coverUrl = els.manualCover.value.trim();
      if (!title) {
        showToast("手入力タイトルを入力してください。");
        return;
      }
      addBook({
        id: createId(),
        title,
        author,
        coverId: null,
        coverUrl: coverUrl || null,
        status: "unread",
        createdAt: new Date().toISOString()
      });
      els.manualTitle.value = "";
      els.manualAuthor.value = "";
      els.manualCover.value = "";
    }

    function addBook(book) {
      if (books.some((item) => item.title === book.title && item.author === book.author)) {
        showToast("同じタイトルと著者の本がすでにあります。");
        return;
      }
      books = [{ ...book, status: "unread" }, ...books];
      if (saveBooks()) {
        render();
        showToast("本を追加しました。");
      }
    }

    function deleteBook(bookId) {
      if (!confirm("この本を本棚から削除しますか？")) return;
      books = books.filter((book) => book.id !== bookId);
      if (state.featuredBookId === bookId) {
        state = { featuredBookId: null, pickedAt: null };
        saveState();
      }
      if (saveBooks()) {
        render();
        showToast("削除しました。");
      }
    }

    function createBingo() {
      const unreadBooks = getUnreadBooks();
      if (!unreadBooks.length) {
        showToast("未読の本がありません。本を追加するか、読了棚から未読に戻してください。");
        return;
      }
      const candidates = unreadBooks.filter((book) => book.id !== state.featuredBookId);
      const pool = candidates.length ? candidates : unreadBooks;
      const picked = pool[Math.floor(Math.random() * pool.length)];
      state = {
        featuredBookId: picked.id,
        pickedAt: new Date().toISOString()
      };
      if (saveState()) {
        render();
        showToast("今日開いてみる本を選びました。");
      }
    }

    function resetBingo() {
      if (!state.featuredBookId) {
        createBingo();
        return;
      }
      createBingo();
    }

    function openReadConfirm(bookId) {
      selectedCell = bookId;
      const book = books.find((item) => item.id === bookId);
      if (!book) return;
      els.confirmBook.innerHTML = "";
      els.confirmBook.appendChild(createCover(book));
      const text = document.createElement("div");
      const title = document.createElement("h3");
      title.textContent = book.title;
      const author = document.createElement("p");
      author.className = "card-sub";
      author.textContent = book.author || "著者不明";
      const question = document.createElement("p");
      question.textContent = book.status === "read"
        ? "この本は読了棚にあります。未読棚に戻すこともできます。"
        : "この本を読み終えましたか？";
      text.append(title, author, question);
      els.confirmBook.appendChild(text);
      els.markRead.textContent = book.status === "read" ? "読了のまま" : "読了にする";
      els.markUnread.textContent = book.status === "read" ? "未読に戻す" : "まだ読んでない";
      openModal("confirmModal");
    }

    function markSelectedRead() {
      if (selectedCell === null) return;
      const book = books.find((item) => item.id === selectedCell);
      if (!book) return;
      book.status = "read";
      if (state.featuredBookId === book.id) {
        state = { featuredBookId: null, pickedAt: null };
        saveState();
      }
      if (saveBooks()) {
        closeModal("confirmModal");
        render();
        showToast("読了棚に移しました。");
      }
      selectedCell = null;
    }

    function markSelectedUnread() {
      if (selectedCell === null) {
        closeModal("confirmModal");
        return;
      }
      const book = books.find((item) => item.id === selectedCell);
      if (!book) return;
      if (book.status === "read") {
        book.status = "unread";
        if (saveBooks()) {
          closeModal("confirmModal");
          render();
          showToast("未読棚に戻しました。");
        }
      } else {
        closeModal("confirmModal");
      }
      selectedCell = null;
    }

    function getUnreadBooks() {
      return books.filter((book) => book.status !== "read");
    }

    function getReadBooks() {
      return books.filter((book) => book.status === "read");
    }

    function getFeaturedBook() {
      const book = books.find((item) => item.id === state.featuredBookId);
      return book && book.status !== "read" ? book : null;
    }

    function openModal(id) {
      document.getElementById(id).classList.add("show");
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove("show");
    }

    function setSearchMessage(message) {
      els.searchMessage.style.display = message ? "block" : "none";
      els.searchMessage.textContent = message;
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      els.toast.textContent = message;
      els.toast.classList.add("show");
      toastTimer = setTimeout(() => els.toast.classList.remove("show"), 3200);
    }

    function createId() {
      return `book_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    }
  </script>
</body>
